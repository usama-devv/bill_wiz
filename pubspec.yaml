name: bill_wiz
description: "Professional POS App with Barcode Scanner - Bill Wiz"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management & DI
  flutter_bloc: ^8.1.5
  get_it: ^7.6.7
  equatable: ^2.0.5
  
  # Functional Programming
  fpdart: ^1.1.0
  
  # Code Generation Annotations
  json_annotation: ^4.9.0
  
  # Navigation
  go_router: ^14.0.0
  
  # Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI & Utilities
  google_fonts: ^6.1.0
  flutter_vibrate: ^1.3.0
  intl: ^0.19.0
  permission_handler: ^11.3.1
  
  # Scanner & Printer
  pretty_qr_code: ^3.3.0
  print_bluetooth_thermal: ^1.1.2
  mobile_scanner: ^5.1.0
  bloc: ^8.1.4
  uuid: ^4.5.2
  app_settings: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
